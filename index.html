<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>⚡ P2P Game Relay</title>
<style>
body{font-family:system-ui,sans-serif;margin:0;padding:14px;background:#0d0d0d;color:#ccc;text-align:center}
h2{color:#f7931a;margin:0 0 4px;font-size:16px}
.sub{opacity:.65;font-size:11px;margin:0 0 10px}
.pill{display:inline-block;padding:3px 12px;border-radius:99px;font-size:12px;font-weight:800}
.ok{background:#1a4d2e;color:#6fcf97}.bad{background:#4d1a1a;color:#f28b82}.wait{background:#4d3e1a;color:#f5c842}
pre{background:#0b1020;color:#d6e1ff;padding:8px;border-radius:8px;overflow:auto;max-height:140px;font-size:10px;text-align:left;margin-top:8px}
.minbtn{background:#f7931a;color:#000;font-weight:900;cursor:pointer;border:none;padding:14px 32px;border-radius:12px;font-size:18px;margin:12px 0;display:block;width:100%}
.minbtn:hover{background:#ffaa33}
.stats{font-size:12px;margin:6px 0;opacity:.8}
#phone{font-family:monospace;color:#f7931a;font-size:13px;margin:6px 0;word-break:break-all}
</style>
</head>
<body>
<h2>⚡ P2P Game Relay</h2>
<p class="sub">Inscription hex = phone number. The internet is the network.</p>
<span id="status" class="pill bad">offline</span>
<div id="phone"></div>
<div class="stats">Peers: <b id="peerCount">0</b> · Messages: <b id="msgCount">0</b></div>
<button class="minbtn" id="backBtn">⬇ Minimize & Return</button>
<pre id="log">…</pre>

<!--
  HOW THIS WORKS:

  The internet IS the phone network. We use what already exists:

  1. Nostr relays (free, public, decentralized, Bitcoin-native)
     → The "phone exchange" — peers publish/find each other here
     → wss://relay.damus.io, wss://nos.lol, etc.

  2. STUN servers (free, public, Google/Cloudflare run them)
     → NAT traversal — lets peers behind routers find each other

  3. WebRTC data channels
     → The direct call — after the 2s handshake, it's pure P2P

  Inscription hex = the phone number everyone dials.
  Nostr relays = the internet's phone exchange.
  After connecting = direct line, no middleman.

  Trystero handles all the WebRTC+Nostr plumbing in one library.
-->

<script type="module">
(async()=>{
/* ── DOM ── */
const $=id=>document.getElementById(id);
const logEl=$("log"),statusEl=$("status"),pcEl=$("peerCount"),mcEl=$("msgCount");
const log=m=>{logEl.textContent=m+"\n"+logEl.textContent.slice(0,2000)};
const ss=(t,c)=>{statusEl.textContent=t;statusEl.className="pill "+(c||"bad")};

log("⏳ Loading library…");
ss("loading…","wait");

/* ── Import trystero (Nostr strategy) ── */
let joinRoom;
try{
  const mod=await import('https://esm.sh/trystero@0.18.0/nostr');
  joinRoom=mod.joinRoom;
  log("✅ Library loaded");
}catch(e){
  log("❌ Failed to load library: "+e.message);
  ss("load error");
  return;
}

/* ── Lobby = inscription hex from URL hash ── */
const LOBBY=decodeURIComponent((location.hash||"").replace(/^#/,""));
if(!LOBBY){ss("no lobby");log("❌ No inscription hex in URL hash");return}
$("phone").textContent="📞 "+LOBBY.slice(0,16)+"…";
log("📞 Phone: "+LOBBY.slice(0,16)+"…");

/* ── State ── */
let opener=window.opener||((window.parent!==window)?window.parent:null);
let msgCount=0;
const peers=new Set();

/* ── Tell inscription we're ready ── */
function notifyReady(){
  if(opener)try{opener.postMessage(JSON.stringify({lobby:LOBBY,type:"relay-ready"}),"*")}catch{}
}
function updateUI(){
  pcEl.textContent=peers.size;
  ss(peers.size?peers.size+" peer"+(peers.size>1?"s":""):"searching…",peers.size?"ok":"wait");
}

/* ── Join the room — inscription hex IS the room name ── */
ss("connecting…","wait");
log("🔍 Dialing into "+LOBBY.slice(0,16)+"…");

let room,sendGame,getGame;
try{
  room=joinRoom({appId:'ordinals-arena'},LOBBY);
  [sendGame,getGame]=room.makeAction('game');
  log("📡 Connected to Nostr relays — waiting for peers…");
}catch(e){
  log("❌ Failed to join room: "+e.message);
  ss("join error");
  return;
}

/* ── Peer events ── */
room.onPeerJoin(peerId=>{
  peers.add(peerId);
  log("✅ "+peerId.slice(0,8)+"… connected!");
  updateUI();
  notifyReady();
  if(window.opener)try{window.opener.focus()}catch{}
});

room.onPeerLeave(peerId=>{
  peers.delete(peerId);
  log("❌ "+peerId.slice(0,8)+"… left");
  updateUI();
});

/* ── Receive game data from peers → forward to inscription ── */
getGame((data,peerId)=>{
  msgCount++;mcEl.textContent=msgCount;
  if(opener)try{opener.postMessage(JSON.stringify({lobby:LOBBY,type:"peer-msg",data}),"*")}catch{}
});

/* ── Receive game data from inscription → send to all peers ── */
window.addEventListener("message",ev=>{
  let msg;try{msg=typeof ev.data==="string"?JSON.parse(ev.data):ev.data}catch{return}
  if(!msg||msg.lobby!==LOBBY)return;
  if(ev.source)opener=ev.source;

  if(msg.type==="ping"){notifyReady();return}

  /* broadcast to all peers */
  try{sendGame(msg)}catch(e){log("⚠️ Send err: "+e.message)}
  msgCount++;mcEl.textContent=msgCount;
});

/* ── Signal ready once Nostr relays connect ── */
setTimeout(notifyReady,1500);
setTimeout(notifyReady,3000);
setTimeout(notifyReady,6000);
updateUI();

/* ── Minimize ── */
$("backBtn").onclick=()=>{
  try{window.resizeTo(200,80);window.moveTo(screen.width-220,screen.height-120)}catch{}
  if(window.opener)try{window.opener.focus()}catch{}
};
})();
</script>
</body>
</html>
